<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Performance — Sign-Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase SDK (compat build — no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#FAFAFA;
    --surface:#FFFFFF;
    --border:#E7E7EA;
    --border-strong:#D4D4D9;
    --ink:#18181B;
    --ink-soft:#52525B;
    --muted:#A1A1AA;
    --accent:#4F46E5;
    --accent-hover:#4338CA;
    --accent-soft:#EEF2FF;
    --green:#16A34A;
    --green-soft:#F0FDF4;
    --red:#DC2626;
    --red-soft:#FEF2F2;
    --shadow-sm:0 1px 2px rgba(24,24,27,0.04);
    --shadow-md:0 4px 16px rgba(24,24,27,0.07);
    --shadow-lg:0 20px 45px -12px rgba(24,24,27,0.16);
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:transparent;}
  .app{
    min-height:100%;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    padding:48px 20px 60px;
    display:flex;
    flex-direction:column;
    align-items:center;
    -webkit-font-smoothing:antialiased;
  }

  /* Top bar (shown when signed in) */
  .topbar{
    width:100%;
    max-width:420px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
    font-size:13px;
    color:var(--muted);
    gap:10px;
  }
  .topbar .who{display:flex;align-items:center;gap:8px;min-width:0;}
  .topbar .who span{
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px;
  }
  .avatar{
    width:24px;height:24px;border-radius:50%;
    background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;
    overflow:hidden;flex-shrink:0;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .signout-link{
    background:none;border:none;color:var(--muted);
    font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;
    text-decoration:none;flex-shrink:0;
    padding:6px 0;
  }
  .signout-link:hover{color:var(--ink);}

  .event-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--accent-soft);color:var(--accent);
    font-size:12.5px;font-weight:600;
    padding:7px 14px;border-radius:999px;
    margin-bottom:16px;
  }

  .header{text-align:center;margin-bottom:28px;max-width:420px;}
  .eyebrow{
    font-size:12px;font-weight:600;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--accent);margin:0 0 8px;
  }
  .title{
    font-size:28px;font-weight:800;letter-spacing:-0.02em;
    margin:0 0 10px;line-height:1.2;color:var(--ink);
  }
  .subtitle{font-size:14.5px;color:var(--ink-soft);line-height:1.6;margin:0;}

  /* Card */
  .card{
    width:100%;max-width:420px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:28px;
    box-shadow:var(--shadow-md);
  }

  /* Google sign-in button */
  .google-btn{
    width:100%;
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:12px 0;
    background:var(--surface);
    border:1px solid var(--border-strong);
    border-radius:10px;
    font-family:'Inter',sans-serif;
    font-size:14.5px;font-weight:600;color:var(--ink);
    cursor:pointer;
    transition:box-shadow .15s, border-color .15s;
  }
  .google-btn:hover{box-shadow:var(--shadow-sm);border-color:var(--muted);}
  .google-icon{width:18px;height:18px;flex-shrink:0;}

  .field{margin-bottom:16px;}
  label{
    display:block;font-size:12.5px;font-weight:600;
    color:var(--ink-soft);margin-bottom:6px;
  }
  input[type=text], textarea{
    width:100%;
    background:var(--surface);
    border:1px solid var(--border-strong);
    border-radius:9px;
    padding:11px 12px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:16px;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input[type=text]:focus, textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  textarea{resize:vertical;min-height:66px;}
  input:disabled{background:#F4F4F5;color:var(--muted);}

  .toggle-row{display:flex;gap:8px;}
  .toggle-btn{
    flex:1;padding:11px 0;
    border-radius:9px;
    border:1px solid var(--border-strong);
    background:var(--surface);
    color:var(--ink-soft);
    font-family:'Inter',sans-serif;font-weight:600;font-size:14px;
    cursor:pointer;
    transition:all .15s;
  }
  .toggle-btn:hover{border-color:var(--muted);}
  .toggle-btn.active-yes{background:var(--ink);border-color:var(--ink);color:#fff;}
  .toggle-btn.active-no{background:#F4F4F5;border-color:var(--border-strong);color:var(--ink);}

  .activity-wrap{
    max-height:0;overflow:hidden;opacity:0;
    transition:max-height .3s ease, opacity .3s ease, margin .3s ease;
  }
  .activity-wrap.open{max-height:340px;opacity:1;margin-top:16px;}

  .submit-btn{
    width:100%;padding:13px 0;
    border-radius:9px;border:none;
    background:var(--accent);color:#fff;
    font-family:'Inter',sans-serif;font-weight:600;font-size:14.5px;
    cursor:pointer;margin-top:6px;
    transition:background .15s;
  }
  .submit-btn:hover{background:var(--accent-hover);}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}

  .hint{font-size:12.5px;color:var(--muted);margin-top:14px;text-align:center;line-height:1.5;}
  .error{color:var(--red);font-size:12.5px;margin-top:6px;}
  .error-box{
    background:var(--red-soft);border:1px solid #FCA5A5;
    color:#991B1B;font-size:13px;border-radius:9px;
    padding:12px 14px;margin-bottom:16px;line-height:1.5;
  }

  hr.div{border:none;border-top:1px solid var(--border);margin:20px 0;}

  /* Confirmation */
  .confirm-top{text-align:center;margin-bottom:20px;}
  .status-pill{
    display:inline-flex;align-items:center;gap:6px;
    font-size:12.5px;font-weight:600;
    padding:6px 14px;border-radius:999px;margin-bottom:14px;
  }
  .status-pill.yes{background:var(--green-soft);color:var(--green);}
  .status-pill.no{background:#F4F4F5;color:var(--ink-soft);}
  .confirm-top h2{font-size:20px;font-weight:700;margin:0 0 6px;letter-spacing:-0.01em;}
  .confirm-top p{font-size:13.5px;color:var(--ink-soft);margin:0;line-height:1.6;}

  .receipt{
    background:#FAFAFA;border:1px solid var(--border);
    border-radius:10px;padding:14px 16px;font-size:13.5px;margin-bottom:18px;
  }
  .receipt div{display:flex;justify-content:space-between;gap:12px;padding:5px 0;}
  .receipt div + div{border-top:1px solid var(--border);}
  .receipt span:first-child{color:var(--muted);}
  .receipt span:last-child{text-align:right;font-weight:600;max-width:65%;}

  .edit-btn{
    width:100%;padding:11px 0;
    border-radius:9px;border:1px solid var(--border-strong);
    background:var(--surface);color:var(--ink);
    font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;
    cursor:pointer;
  }
  .edit-btn:hover{border-color:var(--muted);}

  .foot-link{
    margin-top:22px;font-size:12.5px;color:var(--muted);
    background:none;border:none;text-decoration:underline;
    cursor:pointer;font-family:'Inter',sans-serif;
  }
  .foot-link:hover{color:var(--accent);}

  /* Dashboard */
  .dash{width:100%;max-width:640px;}
  .dash-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:8px;}
  .dash-head .title{font-size:24px;margin:0;}
  .back-link{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;}
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
  .stat{
    background:var(--surface);border:1.5px solid var(--border);
    border-radius:12px;padding:16px 10px;text-align:center;
    cursor:pointer;font-family:'Inter',sans-serif;
    transition:border-color .15s, box-shadow .15s, background .15s;
  }
  .stat:hover{border-color:var(--muted);}
  .stat.active{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 1px var(--accent);}
  .stat.active .num, .stat.active .lbl{color:var(--accent);}
  .stat .num{font-size:26px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-0.02em;}
  .stat .lbl{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:6px;}
  .list{display:flex;flex-direction:column;gap:10px;}
  .row-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:14px 16px;
    display:flex;justify-content:space-between;gap:14px;
  }
  .row-card .who{font-weight:600;font-size:14.5px;}
  .row-card .dept{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .row-card .act{font-size:13px;color:var(--ink-soft);margin-top:8px;line-height:1.5;}
  .row-card .equip{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.5;}
  .row-card .badge{
    font-size:11.5px;font-weight:700;letter-spacing:0.02em;
    padding:4px 10px;border-radius:999px;white-space:nowrap;
  }
  .badge.yes{background:var(--green-soft);color:var(--green);}
  .badge.no{background:#F4F4F5;color:var(--ink-soft);}
  .row-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
  .delete-btn{
    background:none;border:1px solid var(--border-strong);color:var(--red);
    font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;
    cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;
  }
  .delete-btn:hover{border-color:var(--red);background:var(--red-soft);}
  .delete-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:48px 0;}
  .refresh-btn{
    display:block;margin:20px auto 0;
    background:none;border:1px solid var(--border-strong);color:var(--ink);
    padding:9px 20px;border-radius:999px;font-size:12.5px;font-weight:600;
    cursor:pointer;font-family:'Inter',sans-serif;
  }
  .refresh-btn:hover{border-color:var(--muted);}
  .gate{max-width:340px;margin:0 auto;text-align:center;}
  .gate p{color:var(--ink-soft);font-size:13.5px;margin-bottom:16px;line-height:1.5;}
  .loading{text-align:center;color:var(--muted);font-size:13.5px;padding:60px 0;}
  .spinner{
    width:22px;height:22px;border-radius:50%;
    border:2.5px solid var(--border);border-top-color:var(--accent);
    animation:spin .8s linear infinite;margin:0 auto 14px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  button{-webkit-tap-highlight-color:transparent;}
  .toggle-btn, .submit-btn, .edit-btn, .google-btn, .delete-btn, .refresh-btn{min-height:44px;}

  @media (max-width:420px){
    .app{padding:32px 16px 48px;}
    .title{font-size:24px;}
    .card{padding:20px;}
    .topbar .who span{max-width:130px;}
    .stat-row{gap:8px;}
    .stat{padding:14px 6px;}
    .stat .num{font-size:22px;}
    .row-card{flex-direction:column;}
    .row-actions{flex-direction:row;align-items:center;justify-content:space-between;width:100%;}
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
  // ====== PASTE YOUR FIREBASE CONFIG HERE ======
  const firebaseConfig = {
    apiKey: "AIzaSyBWB7748Ji41hfTJX7GiZjVkDzoHb9dekA",
    authDomain: "staff-annual-party-survey.firebaseapp.com",
    projectId: "staff-annual-party-survey",
    storageBucket: "staff-annual-party-survey.firebasestorage.app",
    messagingSenderId: "163567560084",
    appId: "1:163567560084:web:d143894bd77202e3051b81"
  };

  // ====== SET YOUR COMPANY EMAIL DOMAIN HERE (used to restrict sign-in) ======
  const COMPANY_DOMAINS = ["experteducation.com.au", "elacambodia.com"];

  // Event details shown to staff
  const EVENT_DATE_LABEL = "11 December 2026 · 5:00 PM – 9:00 PM";
  const CHANGE_DEADLINE_LABEL = "27 November 2026";

  // Organizer dashboard passcode
  const ORG_CODE = "stagecall";
  // ================================================================

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

<script>
(function(){
  const app = document.getElementById('app');
  let view = 'loading'; // loading | signin | wrong-domain | form | confirm | gate | dash
  let currentUser = null;
  let editingKey = null;
  let lastEntry = null;
  let volunteerChoice = null;
  let gateUnlocked = false;
  let dashEntries = [];
  let dashFilter = 'all'; // all | yes | no

  const storageReady = firebaseConfig.apiKey !== "YOUR_API_KEY";
  if(!storageReady){
    app.innerHTML = `
      <div class="header">
        <p class="eyebrow">Setup needed</p>
        <h1 class="title">Staff Performance</h1>
        <p class="subtitle">This page hasn't been connected to Firebase yet. Paste your Firebase config into the script near the top of the HTML file and redeploy.</p>
      </div>
    `;
    return;
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function initials(name, email){
    const src = (name || email || '').trim();
    if(!src) return '?';
    const parts = src.split(' ').filter(Boolean);
    if(parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return src.slice(0,2).toUpperCase();
  }

  function eventChipHtml(){
    return `<div class="event-chip">📅 ${escapeHtml(EVENT_DATE_LABEL)}</div>`;
  }

  function topbarHtml(){
    if(!currentUser) return '';
    const photo = currentUser.photoURL
      ? `<img src="${currentUser.photoURL}" alt="">`
      : initials(currentUser.displayName, currentUser.email);
    return `
      <div class="topbar">
        <div class="who">
          <div class="avatar">${photo}</div>
          <span>${escapeHtml(currentUser.email)}</span>
        </div>
        <button class="signout-link" id="signout-btn">Sign out</button>
      </div>
    `;
  }

  function bindTopbar(){
    const btn = document.getElementById('signout-btn');
    if(btn) btn.onclick = () => auth.signOut();
  }

  function render(){
    if(view==='loading') renderLoading();
    else if(view==='signin') renderSignIn();
    else if(view==='wrong-domain') renderWrongDomain();
    else if(view==='form') renderForm();
    else if(view==='confirm') renderConfirm();
    else if(view==='gate') renderGate();
    else if(view==='dash') renderDash();
  }

  function renderLoading(){
    app.innerHTML = `<div class="loading"><div class="spinner"></div>Loading…</div>`;
  }

  function renderSignIn(){
    app.innerHTML = `
      <div class="header">
        <p class="eyebrow">Annual Staff Party</p>
        <h1 class="title">Staff Performance Sign-Up</h1>
        ${eventChipHtml()}
        <p class="subtitle">Sign in with your work Google account to let us know if you'll be performing this year.</p>
      </div>
      <div class="card">
        <button class="google-btn" id="signin-btn">
          <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#4F46E5" d="M24 9.5c3.4 0 6.4 1.2 8.8 3.5l6.5-6.5C35.3 2.7 30 0.5 24 0.5 14.9 0.5 7.1 5.7 3.3 13.3l7.6 5.9C12.7 13.1 17.9 9.5 24 9.5z" opacity="0.9"/>
            <path fill="#4F46E5" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.6H24v9.1h12.7c-.6 3-2.3 5.5-4.9 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17.5z" opacity="0.7"/>
            <path fill="#4F46E5" d="M10.9 28.2c-.5-1.5-.8-3-.8-4.7s.3-3.2.8-4.7l-7.6-5.9C1.5 16.3 0.5 20 0.5 23.5s1 7.2 2.8 10.6l7.6-5.9z" opacity="0.5"/>
            <path fill="#4F46E5" d="M24 47.5c6 0 11.3-2 15.1-5.3l-7.5-5.8c-2.1 1.4-4.7 2.2-7.6 2.2-6.1 0-11.3-3.6-13.1-8.7l-7.6 5.9C7.1 42.3 14.9 47.5 24 47.5z" opacity="0.35"/>
          </svg>
          Continue with Google
        </button>
        <p class="hint">Only ${escapeHtml(COMPANY_DOMAINS.join(' or '))} accounts can sign in.</p>
      </div>
    `;
    document.getElementById('signin-btn').onclick = signIn;
  }

  async function signIn(){
    const btn = document.getElementById('signin-btn');
    btn.disabled = true;
    const provider = new firebase.auth.GoogleAuthProvider();
    // Note: Google's "hd" hint only supports one domain at a time, so with two
    // allowed domains we skip the hint and rely on the check after sign-in below.
    try{
      await auth.signInWithPopup(provider);
    }catch(e){
      btn.disabled = false;
      app.innerHTML += `<p class="error" style="text-align:center;margin-top:14px;">Sign-in failed or was cancelled. Please try again.</p>`;
    }
  }

  function renderWrongDomain(){
    app.innerHTML = `
      <div class="header">
        <p class="eyebrow">Access restricted</p>
        <h1 class="title">Wrong account</h1>
        <p class="subtitle">This form is only open to ${escapeHtml(COMPANY_DOMAINS.join(' or '))} accounts. You're signed in as ${escapeHtml(currentUser ? currentUser.email : '')}.</p>
      </div>
      <div class="card" style="text-align:center;">
        <button class="google-btn" id="switch-btn">Sign in with a different account</button>
      </div>
    `;
    document.getElementById('switch-btn').onclick = async ()=>{
      await auth.signOut();
    };
  }

  function renderForm(){
    app.innerHTML = topbarHtml() + `
      <div class="header">
        <p class="eyebrow">Annual Staff Party</p>
        <h1 class="title">Staff Performance</h1>
        ${eventChipHtml()}
        <p class="subtitle">Let us know if you'd like to perform this year — sing, dance, comedy, or anything else you'd like to share.</p>
      </div>
      <div class="card">
        <div class="field">
          <label for="f-name">Full name</label>
          <input type="text" id="f-name" placeholder="e.g. Sophea Chan" value="${lastEntry ? escapeHtml(lastEntry.name) : escapeHtml(currentUser.displayName||'')}" />
        </div>
        <div class="field">
          <label for="f-dept">Department</label>
          <input type="text" id="f-dept" placeholder="e.g. Marketing" value="${lastEntry ? escapeHtml(lastEntry.department) : ''}" />
        </div>
        <hr class="div">
        <div class="field">
          <label>Will you perform on stage?</label>
          <div class="toggle-row">
            <button type="button" class="toggle-btn" id="btn-yes">Yes</button>
            <button type="button" class="toggle-btn" id="btn-no">No</button>
          </div>
        </div>
        <div class="activity-wrap" id="activity-wrap">
          <div class="field">
            <label for="f-activity">What will you perform?</label>
            <textarea id="f-activity" placeholder="e.g. Solo song — Khmer pop ballad">${lastEntry?lastEntry.activity||'':''}</textarea>
          </div>
          <div class="field">
            <label for="f-equipment">Equipment needed (optional)</label>
            <textarea id="f-equipment" placeholder="e.g. Wireless microphone, sound system, speaker">${lastEntry?lastEntry.equipment||'':''}</textarea>
          </div>
        </div>
        <div id="err" class="error" style="display:none;"></div>
        <button class="submit-btn" id="submit-btn">Reserve My Spot</button>
        <p class="hint">Signed in as ${escapeHtml(currentUser.email)} — your response is saved to your account only. You can change your decision 2 weeks before the event.</p>
      </div>
      <button class="foot-link" id="dash-link">Organizer dashboard →</button>
    `;
    bindTopbar();

    if(volunteerChoice==='yes') setChoice('yes');
    if(volunteerChoice==='no') setChoice('no');

    document.getElementById('btn-yes').onclick = ()=>setChoice('yes');
    document.getElementById('btn-no').onclick = ()=>setChoice('no');
    document.getElementById('submit-btn').onclick = submitForm;
    document.getElementById('dash-link').onclick = ()=>{ view = gateUnlocked ? 'dash' : 'gate'; render(); if(gateUnlocked) loadDash(); };
    updateSubmitLabel();
  }

  function setChoice(choice){
    volunteerChoice = choice;
    const yesBtn = document.getElementById('btn-yes');
    const noBtn = document.getElementById('btn-no');
    const wrap = document.getElementById('activity-wrap');
    yesBtn.classList.toggle('active-yes', choice==='yes');
    noBtn.classList.toggle('active-no', choice==='no');
    wrap.classList.toggle('open', choice==='yes');
    updateSubmitLabel();
  }

  function updateSubmitLabel(){
    const btn = document.getElementById('submit-btn');
    if(!btn || btn.disabled) return;
    btn.textContent = volunteerChoice === 'no' ? 'Finalize My Decision' : 'Reserve My Spot';
  }

  async function submitForm(){
    const name = document.getElementById('f-name').value.trim();
    const dept = document.getElementById('f-dept').value.trim();
    const activity = document.getElementById('f-activity').value.trim();
    const equipment = document.getElementById('f-equipment').value.trim();
    const errEl = document.getElementById('err');
    errEl.style.display = 'none';

    if(!name){ errEl.textContent = 'Please enter your full name.'; errEl.style.display='block'; return; }
    if(!dept){ errEl.textContent = 'Please enter your department.'; errEl.style.display='block'; return; }
    if(!volunteerChoice){ errEl.textContent = 'Please choose Yes or No.'; errEl.style.display='block'; return; }
    if(volunteerChoice==='yes' && !activity){ errEl.textContent = "Let us know what you'll perform."; errEl.style.display='block'; return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const key = currentUser.email;
    const entry = {
      name, department: dept,
      volunteer: volunteerChoice,
      activity: volunteerChoice==='yes' ? activity : '',
      equipment: volunteerChoice==='yes' ? equipment : '',
      email: currentUser.email,
      timestamp: new Date().toISOString()
    };

    try{
      await db.collection('submissions').doc(key).set(entry);
      lastEntry = entry;
      editingKey = key;
      view = 'confirm';
      render();
    }catch(e){
      errEl.textContent = 'Could not save right now — please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      updateSubmitLabel();
    }
  }

  function renderConfirm(){
    const e = lastEntry;
    const isYes = e.volunteer === 'yes';
    app.innerHTML = topbarHtml() + `
      <div class="header">
        <p class="eyebrow">Annual Staff Party</p>
        <h1 class="title">Staff Performance</h1>
        ${eventChipHtml()}
      </div>
      <div class="card">
        <div class="confirm-top">
          <span class="status-pill ${isYes?'yes':'no'}">${isYes ? '● Performing' : '○ Not performing'}</span>
          <h2>${isYes ? 'See you on stage!' : 'Thanks for letting us know'}</h2>
          <p>${isYes ? "Your slot is noted. We'll follow up with run-of-show details closer to the event." : 'No worries — enjoy the party as our audience.'}</p>
        </div>
        <div class="receipt">
          <div><span>Name</span><span>${escapeHtml(e.name)}</span></div>
          <div><span>Department</span><span>${escapeHtml(e.department)}</span></div>
          <div><span>Performing</span><span>${isYes?'Yes':'No'}</span></div>
          ${isYes ? `<div><span>Activity</span><span>${escapeHtml(e.activity)}</span></div>` : ''}
          ${isYes && e.equipment ? `<div><span>Equipment</span><span>${escapeHtml(e.equipment)}</span></div>` : ''}
        </div>
        <button class="edit-btn" id="edit-btn">Edit my response</button>
        <p class="hint">You can change your decision 2 weeks before the event.</p>
      </div>
      <button class="foot-link" id="dash-link">Organizer dashboard →</button>
    `;
    bindTopbar();
    document.getElementById('edit-btn').onclick = ()=>{ volunteerChoice = e.volunteer; view='form'; render(); };
    document.getElementById('dash-link').onclick = ()=>{ view = gateUnlocked ? 'dash' : 'gate'; render(); if(gateUnlocked) loadDash(); };
  }

  function renderGate(){
    app.innerHTML = topbarHtml() + `
      <div class="header">
        <p class="eyebrow">Organizer access</p>
        <h1 class="title">Dashboard</h1>
      </div>
      <div class="card gate">
        <p>Enter the organizer passcode to view all responses.</p>
        <div class="field">
          <input type="text" id="code" placeholder="Passcode" />
        </div>
        <div id="gate-err" class="error" style="display:none;">Incorrect passcode.</div>
        <button class="submit-btn" id="unlock-btn">Unlock Dashboard</button>
      </div>
      <button class="foot-link" id="back-btn">← Back to sign-up form</button>
    `;
    bindTopbar();
    document.getElementById('unlock-btn').onclick = ()=>{
      const code = document.getElementById('code').value.trim();
      if(code === ORG_CODE){
        gateUnlocked = true;
        view = 'dash';
        render();
        loadDash();
      } else {
        document.getElementById('gate-err').style.display = 'block';
      }
    };
    document.getElementById('back-btn').onclick = ()=>{ view = lastEntry ? 'confirm' : 'form'; render(); };
  }

  function renderDash(){
    dashFilter = 'all';
    app.innerHTML = topbarHtml() + `
      <div class="dash">
        <div class="dash-head">
          <h1 class="title">Line-Up Dashboard</h1>
          <button class="back-link" id="back-btn">← Back to form</button>
        </div>
        <div class="stat-row" id="stat-row">
          <div class="stat"><div class="num">–</div><div class="lbl">Total</div></div>
          <div class="stat"><div class="num">–</div><div class="lbl">Performing</div></div>
          <div class="stat"><div class="num">–</div><div class="lbl">Not performing</div></div>
        </div>
        <div id="list-area"><div class="loading"><div class="spinner"></div>Loading responses…</div></div>
        <button class="refresh-btn" id="refresh-btn">Refresh</button>
      </div>
    `;
    bindTopbar();
    document.getElementById('back-btn').onclick = ()=>{ view = lastEntry ? 'confirm' : 'form'; render(); };
    document.getElementById('refresh-btn').onclick = loadDash;
  }

  async function loadDash(){
    const listArea = document.getElementById('list-area');
    if(!listArea) return;
    try{
      const snapshot = await db.collection('submissions').get();
      dashEntries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      dashEntries.sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));
      renderDashStats();
      renderDashList();
    }catch(e){
      listArea.innerHTML = '<div class="empty">Could not load responses. Try refreshing.</div>';
    }
  }

  function renderDashStats(){
    const statRow = document.getElementById('stat-row');
    if(!statRow) return;
    const yesCount = dashEntries.filter(e=>e.volunteer==='yes').length;
    const noCount = dashEntries.filter(e=>e.volunteer==='no').length;
    statRow.innerHTML = `
      <div class="stat ${dashFilter==='all'?'active':''}" data-filter="all"><div class="num">${dashEntries.length}</div><div class="lbl">Total</div></div>
      <div class="stat ${dashFilter==='yes'?'active':''}" data-filter="yes"><div class="num">${yesCount}</div><div class="lbl">Performing</div></div>
      <div class="stat ${dashFilter==='no'?'active':''}" data-filter="no"><div class="num">${noCount}</div><div class="lbl">Not performing</div></div>
    `;
    statRow.querySelectorAll('.stat').forEach(el=>{
      el.onclick = ()=>{
        dashFilter = el.getAttribute('data-filter');
        renderDashStats();
        renderDashList();
      };
    });
  }

  function renderDashList(){
    const listArea = document.getElementById('list-area');
    if(!listArea) return;
    const entries = dashFilter==='all' ? dashEntries : dashEntries.filter(e=>e.volunteer===dashFilter);

    if(entries.length===0){
      const emptyLabel = dashFilter==='all' ? 'No responses yet. Once staff submit the sign-up form, they will appear here.'
        : dashFilter==='yes' ? 'No one has signed up to perform yet.'
        : 'No one has responded "No" yet.';
      listArea.innerHTML = `<div class="empty">${emptyLabel}</div>`;
      return;
    }

    listArea.innerHTML = '<div class="list">' + entries.map(e=>`
      <div class="row-card">
        <div>
          <div class="who">${escapeHtml(e.name)}</div>
          <div class="dept">${escapeHtml(e.department)} · ${escapeHtml(e.email||'')}</div>
          ${e.volunteer==='yes' ? `<div class="act">${escapeHtml(e.activity)}</div>` : ''}
          ${e.volunteer==='yes' && e.equipment ? `<div class="equip">Equipment: ${escapeHtml(e.equipment)}</div>` : ''}
        </div>
        <div class="row-actions">
          <span class="badge ${e.volunteer}">${e.volunteer==='yes'?'YES':'NO'}</span>
          <button class="delete-btn" data-id="${e.id}">Delete</button>
        </div>
      </div>
    `).join('') + '</div>';

    listArea.querySelectorAll('.delete-btn').forEach(btn=>{
      btn.onclick = ()=>deleteEntry(btn.getAttribute('data-id'), btn);
    });
  }

  async function deleteEntry(id, btn){
    if(!confirm('Delete this response? This cannot be undone.')) return;
    btn.disabled = true;
    btn.textContent = '...';
    try{
      await db.collection('submissions').doc(id).delete();
      dashEntries = dashEntries.filter(e => e.id !== id);
      renderDashStats();
      renderDashList();
    }catch(e){
      alert('Could not delete this entry. Check that your Firestore rules allow delete.');
      btn.disabled = false;
      btn.textContent = 'Delete';
    }
  }

  // ---- Auth state ----
  auth.onAuthStateChanged(async (user)=>{
    if(!user){
      currentUser = null;
      view = 'signin';
      render();
      return;
    }
    const emailOk = user.email && COMPANY_DOMAINS.some(d => user.email.toLowerCase().endsWith('@' + d.toLowerCase()));
    if(!emailOk){
      currentUser = user;
      view = 'wrong-domain';
      render();
      return;
    }
    currentUser = user;
    editingKey = user.email;
    try{
      const docSnap = await db.collection('submissions').doc(user.email).get();
      if(docSnap.exists){
        lastEntry = docSnap.data();
        volunteerChoice = lastEntry.volunteer;
        view = 'confirm';
      } else {
        view = 'form';
      }
    }catch(e){
      view = 'form';
    }
    render();
  });

  render();
})();
</script>
</body>
</html>
